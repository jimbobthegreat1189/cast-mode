<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Cast Mode">
<meta name="theme-color" content="#050510">
<title>Cast Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}
body{background:#050510;font-family:'Exo 2',system-ui,sans-serif;color:#e2e8f0;}
#app{transition:background-color 0.6s ease;}
h1,h2,h3{font-family:'Rajdhani',system-ui,sans-serif;font-weight:700;}
button{cursor:pointer;font-family:'Rajdhani',system-ui,sans-serif;font-weight:700;border:none;transition:all .15s;letter-spacing:.5px;-webkit-tap-highlight-color:transparent;}
button:active{transform:scale(.95)!important;}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:#050510;position:relative;}
.scr{min-height:100vh;min-height:100dvh;padding:24px 20px calc(48px + env(safe-area-inset-bottom,0px));animation:fadeUp .3s ease both;}
.card{background:var(--surf,#0c0c1e);border:1px solid var(--bdr,rgba(255,255,255,.07));border-radius:16px;padding:20px;}
.card-sm{background:var(--surf,#0c0c1e);border:1px solid var(--bdr,rgba(255,255,255,.07));border-radius:12px;padding:14px 16px;}
.btn-main{display:block;width:100%;padding:16px;background:var(--accent,#00ff88);color:#000;font-size:17px;border-radius:14px;text-transform:uppercase;letter-spacing:1px;}
.btn-main:hover{filter:brightness(1.1);}
.btn-outline{display:block;width:100%;padding:13px;background:transparent;color:#e2e8f0;font-size:15px;border-radius:12px;text-transform:uppercase;letter-spacing:1px;border:1px solid rgba(255,255,255,.07);}
.btn-sm{padding:8px 14px;background:#121228;color:#e2e8f0;font-size:13px;border-radius:8px;border:1px solid rgba(255,255,255,.07);text-transform:uppercase;letter-spacing:.5px;}
.xp-bar{height:8px;background:#121228;border-radius:4px;overflow:hidden;}
.xp-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.tier-bar{height:6px;background:#121228;border-radius:3px;overflow:hidden;}
.tier-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin:2px;}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-block;}
.wk-card{background:#0c0c1e;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px;transition:all .2s;cursor:pointer;}
.wk-card:active{transform:scale(.97);}
.wk-locked{opacity:.45;cursor:not-allowed;}
.sk-card{background:#0c0c1e;border:2px solid transparent;border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.sk-card.active{border-color:var(--accent,#00ff88);}
.sk-card.locked{opacity:.42;cursor:not-allowed;}
.ex-dot{border-radius:50%;transition:all .3s;display:inline-block;}
.confetti-piece{position:fixed;pointer-events:none;z-index:999;animation:fall linear forwards;}
.timer-inner{position:absolute;text-align:center;top:50%;left:50%;transform:translate(-50%,-50%);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes levelUp{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>

const CAT_COLOR={warmup:'#94a3b8',strength:'#ff6b35',mobility:'#818cf8',stretch:'#34d399'};
const CAT_LABEL={warmup:'Warm-Up',strength:'Strength',mobility:'Athletic',stretch:'Stretch'};
const xpToLvl=xp=>Math.floor(Math.sqrt(xp/40))+1;
const lvlToXp=l=>Math.pow(l-1,2)*40;
const getTierData=(ex,ti)=>{
  if(!ex)return null;
  if(ti===0&&ex.t0)return{...ex,...ex.t0};
  if(ti===2&&ex.t2)return{...ex,...ex.t2};
  return ex;
};
const getWkDur=(w,ti)=>{
  const s=w.ex.reduce((a,id)=>a+(getTierData(EX[id],ti)?.dur||30),0)+(w.ex.length-1)*12;
  return'~'+Math.round(s/60)+' min';
};

const state={
  xp:0,skin:'default',streak:1,sessions:0,lastStr:'',
  screen:'home',workout:null,exIdx:0,phase:'exercise',
  timeLeft:0,totalTime:0,showTip:false,musicOn:false,
  sessionXp:0,didLevelUp:false,tierUnlocked:false,newTierIdx:0,paused:false,
};

function encode(){
  const d={xp:state.xp,sk:state.skin,st:state.streak,se:state.sessions,ls:state.lastStr};
  return btoa(JSON.stringify(d));
}
function decode(str){
  try{
    const d=JSON.parse(atob(str));
    if(d.xp!=null)state.xp=+d.xp;
    if(d.sk!=null)state.skin=d.sk;
    if(d.st!=null)state.streak=+d.st;
    if(d.se!=null)state.sessions=+d.se;
    if(d.ls!=null)state.lastStr=d.ls;
    return true;
  }catch{return false;}
}
function save(){
  const enc=encode();
  try{localStorage.setItem('cm_save',enc);}catch{}
  try{sessionStorage.setItem('cm_save',enc);}catch{}
  // Also store in URL hash so it survives file re-opens
  try{history.replaceState(null,'','#'+enc);}catch{}
}
function load(){
  // Priority: localStorage > sessionStorage > URL hash
  let enc=null;
  try{enc=localStorage.getItem('cm_save');}catch{}
  if(!enc){try{enc=sessionStorage.getItem('cm_save');}catch{}}
  if(!enc&&location.hash){enc=location.hash.slice(1);}
  if(enc)decode(enc);
}

// ══════════════ AUDIO ══════════════
let _bCtx=null;
function bCtx(){
  if(!_bCtx||_bCtx.state==='closed')
    _bCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_bCtx.state==='suspended')_bCtx.resume();
  return _bCtx;
}
function beep(){
  try{
    const ctx=bCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
  }catch(e){console.warn('beep failed',e);}
}
let _music=null;
function makeAudio(){
  let ctx=null,loop=null,nT=0,step=0;
  const e=(60/128)/2;
  const kick=t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(190,t);o.frequency.exponentialRampToValueAtTime(38,t+.15);g.gain.setValueAtTime(.65,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);};
  const mkN=(d,f,tp)=>{const b=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate),da=b.getChannelData(0);for(let i=0;i<da.length;i++)da[i]=Math.random()*2-1;const s=ctx.createBufferSource(),g=ctx.createGain(),fi=ctx.createBiquadFilter();fi.type=tp;fi.frequency.value=f;s.buffer=b;return{s,g,fi};};
  const snare=t=>{const{s,g,fi}=mkN(.12,2500,'bandpass');s.connect(fi);fi.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);s.start(t);};
  const hat=t=>{const{s,g,fi}=mkN(.04,8000,'highpass');s.connect(fi);fi.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);s.start(t);};
  const sched=()=>{if(!ctx)return;while(nT<ctx.currentTime+.15){hat(nT);if(step===0||step===4)kick(nT);if(step===2||step===6)snare(nT);nT+=e;step=(step+1)%8;}};
  return{
    start(){try{ctx=new(window.AudioContext||window.webkitAudioContext)();nT=ctx.currentTime;step=0;sched();loop=setInterval(sched,25);}catch{}},
    stop(){if(loop)clearInterval(loop);loop=null;try{if(ctx)ctx.close();}catch{};ctx=null;}
  };
}
function stopMusic(){if(_music){_music.stop();_music=null;state.musicOn=false;}}
function toggleMusic(){
  if(state.musicOn){stopMusic();}
  else{_music=makeAudio();_music.start();state.musicOn=true;}
}

// ══════════════ TIMER ══════════════
let _timer=null;
function stopTimer(){if(_timer){clearInterval(_timer);_timer=null;}}
function startTimer(){
  stopTimer();
  if(state.paused)return;
  _timer=setInterval(()=>{
    if(state.paused)return;
    if(state.timeLeft<=1){
      state.timeLeft=0;
      stopTimer();
      onExpired();
      return;
    }
    state.timeLeft--;
    if(state.timeLeft<=3)beep();
    updateTimerOnly();
  },1000);
}
function togglePause(){
  state.paused=!state.paused;
  if(state.paused){
    stopTimer();
  }else{
    startTimer();
  }
  // just update the pause button without full re-render
  const btn=document.querySelector('[data-action="toggle-pause"]');
  if(btn){btn.textContent=state.paused?'▶ Resume':'⏸ Pause';btn.style.color=state.paused?'#00ff88':'#475569';btn.style.borderColor=state.paused?'#00ff8860':'#1e293b';}
  const overlay=document.getElementById('pause-overlay');
  if(overlay)overlay.style.display=state.paused?'flex':'none';
}
function updateTimerOnly(){
  const num=document.getElementById('t-num');
  const arc=document.getElementById('t-arc');
  if(!num||!arc)return;
  const urgent=state.timeLeft<=5;
  const skin=SKINS.find(s=>s.id===state.skin)||SKINS[0];
  const baseColor=state.phase==='rest'?'#475569':skin.color;
  const color=urgent?'#ff4757':baseColor;
  num.textContent=state.timeLeft;
  num.style.color=color;
  num.style.animation=urgent?'pulse .5s ease-in-out infinite':'';
  arc.setAttribute('stroke',color);
  const size=175,r=(size-20)/2,circ=2*Math.PI*r;
  const offset=circ*(1-(state.totalTime>0?state.timeLeft/state.totalTime:0));
  arc.setAttribute('stroke-dashoffset',offset);
}
function onExpired(){
  const w=state.workout,i=state.exIdx,p=state.phase,ti=getTier(state.sessions);
  if(!w)return;
  if(p==='exercise'){
    if(i<w.ex.length-1){
      state.phase='rest';state.timeLeft=12;state.totalTime=12;
      render();startTimer();
    }else{
      const gained=w.xp;
      const prevLvl=xpToLvl(state.xp);
      state.xp+=gained;
      state.sessionXp=gained;
      state.didLevelUp=xpToLvl(state.xp)>prevLvl;
      state.streak++;
      const prevTi=getTier(state.sessions);
      state.sessions++;
      const newTi=getTier(state.sessions);
      state.tierUnlocked=w.str&&newTi>prevTi;
      state.newTierIdx=newTi;
      if(w.str)state.lastStr=getToday();
      stopMusic();save();
      state.screen='celebrate';render();
    }
  }else{
    const ni=i+1;
    const nex=EX[w.ex[ni]];
    const nexd=getTierData(nex,ti);
    state.exIdx=ni;state.phase='exercise';state.showTip=false;
    state.timeLeft=nexd?.dur||30;state.totalTime=nexd?.dur||30;
    render();startTimer();
  }
}

// ══════════════ SVG TIMER RING ══════════════
function timerRingHTML(tl,tt,color,size=175){
  const r=(size-20)/2,circ=2*Math.PI*r;
  const offset=circ*(1-(tt>0?tl/tt:0));
  const urgent=tl<=5&&tl>0;
  const c=urgent?'#ff4757':color;
  return`<div style="position:relative;width:${size}px;height:${size}px;margin:0 auto;">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg);display:block;">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#121228" stroke-width="14"/>
      <circle id="t-arc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="14"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="transition:stroke-dashoffset 1s linear,stroke .3s"/>
    </svg>
    <div class="timer-inner">
      <div id="t-num" style="font-size:52px;font-family:'Rajdhani',sans-serif;font-weight:700;line-height:1;color:${c};${urgent?'animation:pulse .5s ease-in-out infinite':''}">${tl}</div>
      <div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:2px;margin-top:2px">sec</div>
    </div>
  </div>`;
}

  const topBar=`<div style="padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;gap:6px">
    <button class="btn-sm" data-action="quit-workout" style="color:#ff4757;border-color:#ff475730">&#10005; Quit</button>
    <button class="btn-sm" data-action="toggle-pause" style="color:${state.paused?'#00ff88':'#475569'};border-color:${state.paused?'#00ff8860':'#1e293b'}">${state.paused?'&#9654; Resume':'&#9208; Pause'}</button>
    <div style="font-family:'Rajdhani',sans-serif;font-size:14px;color:#475569">${state.exIdx+1} / ${w.ex.length}</div>
    <button class="btn-sm" data-action="toggle-music" style="color:${state.musicOn?skin.color:'#475569'};border-color:${state.musicOn?skin.color+'60':'#1e293b'}">${state.musicOn?'🎵 ON':'🔇 Music'}</button>
  </div>
  <div id="pause-overlay" style="display:${state.paused?'flex':'none'};position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 88%,transparent);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:20px">
    <div style="font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:2px">Paused</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:#e2e8f0;text-align:center;padding:0 32px;line-height:1.3">${state.phase==='exercise'&&EX[w.ex[state.exIdx]]?EX[w.ex[state.exIdx]].name:''}</div>
    ${state.phase==='exercise'&&EX[w.ex[state.exIdx]]?`<div style="font-size:13px;color:#94a3b8;text-align:center;padding:0 28px;line-height:1.7;max-width:340px">${getTierData(EX[w.ex[state.exIdx]],getTier(state.sessions))?.inst||''}</div>`:''}
    <div style="display:flex;gap:10px;margin-top:8px">
      <button data-action="toggle-pause" style="padding:14px 32px;background:#00ff88;color:#000;border:none;border-radius:12px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px">&#9654; RESUME</button>
    </div>
    <div style="font-size:12px;color:#475569;margin-top:4px">Timer paused &#8226; Take your time</div>
  </div>`;
  const progressBar=`<div style="padding:12px 20px 0">
    <div style="height:3px;background:#121228;border-radius:2px;overflow:hidden;margin-bottom:8px">
      <div style="height:100%;width:${progress}%;background:${skin.color};border-radius:2px;transition:width .5s ease"></div>
    </div>
    <div style="display:flex;gap:5px;justify-content:center">${dots}</div>
  </div>`;

  if(state.phase==='rest'){
    return`<div style="min-height:100vh;min-height:100dvh;background:var(--bg);animation:fadeUp .3s ease both;display:flex;flex-direction:column">
      ${topBar}${progressBar}
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
        <div style="font-size:52px;margin-bottom:8px;animation:float 2s ease-in-out infinite">💨</div>
        <h2 style="font-size:28px;margin-bottom:6px">Rest Up</h2>
        ${nextName?`<div style="font-size:14px;color:#475569;margin-bottom:20px">Next: <span style="color:${skin.color}">${nextName}</span></div>`:'<div style="margin-bottom:20px"></div>'}
        ${timerRingHTML(state.timeLeft,state.totalTime,'#475569')}
        <div style="margin-top:20px;font-size:13px;color:#475569">Shake out your hands. You're doing great 👊</div>
      </div>
    </div>`;
  }

  if(!ex||!exd)return renderHome();
  const catColor=CAT_COLOR[ex.cat]||'#475569';
  return`<div style="min-height:100vh;min-height:100dvh;background:var(--bg);animation:fadeUp .3s ease both;display:flex;flex-direction:column">
    ${topBar}${progressBar}
    <div style="flex:1;display:flex;flex-direction:column;padding:16px 20px 24px;gap:14px">
      <div style="text-align:center">
        <div style="display:flex;justify-content:center;gap:8px;margin-bottom:8px">
          <span class="badge" style="background:${catColor}20;color:${catColor};border:1px solid ${catColor}35">${CAT_LABEL[ex.cat]||ex.cat}</span>
          <span class="badge" style="background:${tier.color}18;color:${tier.color};border:1px solid ${tier.color}30">${tier.name}</span>
        </div>
        <div style="font-size:44px;margin-bottom:4px">${ex.emoji}</div>
        <h2 style="font-size:24px;color:${skin.color};line-height:1.15;margin-bottom:6px">${ex.name}</h2>
        <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">
          ${ex.muscles.map(m=>`<span class="chip" style="background:${skin.color}15;color:${skin.color};border:1px solid ${skin.color}30">${m}</span>`).join('')}
        </div>
      </div>
      ${timerRingHTML(state.timeLeft,state.totalTime,skin.color)}
      <div class="card" style="border-color:${skin.color}18">
        <div style="font-size:13px;line-height:1.75;color:#cbd5e1">${exd.inst}</div>
        ${exd.mod?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #121228;font-size:12px;color:#475569;font-style:italic">💡 Mod: ${exd.mod}</div>`:''}
      </div>
      <button data-action="toggle-tip" style="background:${state.showTip?skin.color+'12':'#0c0c1e'};border:1px solid ${state.showTip?skin.color:'#1e293b'};border-radius:12px;padding:12px 16px;color:${state.showTip?skin.color:'#475569'};text-align:left;font-size:13px;font-family:'Exo 2',sans-serif;line-height:1.6;transition:all .2s;width:100%">
        ${state.showTip?`<strong>🔑 Form Key: </strong>${exd.tip}`:'🔑 Tap to reveal form tip'}
      </button>
    </div>
  </div>`;
}

function renderCelebrate(){
  const skin=SKINS.find(s=>s.id===state.skin)||SKINS[0];
  const ti=getTier(state.sessions);
  const tier=TIERS[ti];
  const newTier=state.tierUnlocked?TIERS[state.newTierIdx]:null;
  const lvl=xpToLvl(state.xp);
  const colors=['#00ff88','#ff6b35','#818cf8','#06b6d4','#f59e0b','#ec4899'];
  const confetti=Array.from({length:40},(_,k)=>`<div class="confetti-piece" style="left:${Math.random()*100}%;top:0;width:${7+Math.random()*10}px;height:${7+Math.random()*10}px;background:${colors[k%6]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2.2}s;animation-delay:${Math.random()*1.8}s"></div>`).join('');
  return`<div style="min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;animation:fadeUp .4s ease both;position:relative;overflow:hidden">
    ${confetti}
    <div style="font-size:80px;margin-bottom:8px;animation:float 3s ease-in-out infinite">${skin.emoji}</div>
    ${newTier?`<div style="background:${newTier.color}18;border:2px solid ${newTier.color};border-radius:14px;padding:10px 28px;margin-bottom:14px;animation:levelUp .7s cubic-bezier(.34,1.56,.64,1) .2s both">
      <div style="font-family:'Rajdhani',sans-serif;font-size:22px;color:${newTier.color};font-weight:700">🔓 STAGE UNLOCKED</div>
      <div style="font-size:13px;color:${newTier.color}">${newTier.name} — exercises are now harder</div>
    </div>`:''}
    ${state.didLevelUp?`<div style="background:${skin.color}20;border:2px solid ${skin.color};border-radius:14px;padding:10px 28px;margin-bottom:14px;animation:levelUp .6s cubic-bezier(.34,1.56,.64,1) both">
      <div style="font-family:'Rajdhani',sans-serif;font-size:24px;color:${skin.color};font-weight:700">⚡ LEVEL UP!</div>
      <div style="font-size:13px;color:${skin.color}bb">You reached Level ${lvl}</div>
    </div>`:''}
    <h1 style="font-size:38px;color:${skin.color};margin-bottom:4px">SESSION ${state.sessions} DONE!</h1>
    <div style="font-size:15px;color:#94a3b8;margin-bottom:28px">Recovery starts now. Come back tomorrow. 🦾</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:100%;margin-bottom:24px">
      ${[{l:'XP Earned',v:'+'+state.sessionXp,c:skin.color},{l:'Total XP',v:state.xp.toLocaleString(),c:'#94a3b8'},{l:'Streak',v:'🔥 '+state.streak,c:'#f59e0b'}].map(s=>`<div class="card" style="padding:14px;text-align:center">
        <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:${s.c}">${s.v}</div>
        <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-top:2px">${s.l}</div>
      </div>`).join('')}
    </div>
    <div class="card-sm" style="border-color:${tier.color}28;width:100%;margin-bottom:24px;text-align:left">
      <div style="font-size:11px;color:#475569;font-family:'Rajdhani',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Stage: ${tier.name}</div>
      <div style="font-size:13px;color:#94a3b8;line-height:1.7">Strength built now carries over when the cast comes off. Swimmers and runners both need this. You're investing in your comeback. 🏊</div>
    </div>
    <button class="btn-main" data-action="goto-home" style="font-size:17px">🏠 Back to Home</button>
  </div>`;
}

// ══════════════ RENDER ══════════════
function render(){
  stopTimer();
  const skin=SKINS.find(s=>s.id===state.skin)||SKINS[0];
  const t=skin.theme;
  const root=document.documentElement;
  root.style.setProperty('--accent',skin.color);
  root.style.setProperty('--bg',t.bg);
  root.style.setProperty('--surf',t.surf);
  root.style.setProperty('--surf2',t.surf2);
  root.style.setProperty('--bdr',t.bdr);
  const app=document.getElementById('app');
  if(app){app.style.backgroundColor=t.bg;app.style.backgroundImage=t.pattern;}
  const screens={home:renderHome,skins:renderSkins,select:renderSelect,workout:renderWorkout,celebrate:renderCelebrate};
  document.getElementById('app').innerHTML=(screens[state.screen]||renderHome)();
  if(state.screen==='workout')startTimer();
}

// ══════════════ EVENTS ══════════════
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const a=el.dataset.action,d=el.dataset;
  if(a==='goto-home'){stopTimer();stopMusic();state.screen='home';render();}
  else if(a==='goto-select'){state.screen='select';render();}
  else if(a==='goto-skins'){state.screen='skins';render();}
  else if(a==='select-skin'){state.skin=d.id;save();render();}
  else if(a==='start-workout'){
    bCtx(); // unlock audio on user gesture
    const w=WORKOUTS.find(x=>x.id===d.id);
    if(!w)return;
    const ti=getTier(state.sessions);
    const fe=EX[w.ex[0]];
    const fed=getTierData(fe,ti);
    state.workout=w;state.exIdx=0;state.phase='exercise';state.showTip=false;
    state.didLevelUp=false;state.tierUnlocked=false;state.paused=false;
    state.timeLeft=fed?.dur||30;state.totalTime=fed?.dur||30;
    state.screen='workout';render();
  }
  else if(a==='quit-workout'){stopTimer();stopMusic();state.workout=null;state.paused=false;state.screen='home';render();}
  else if(a==='toggle-music'){toggleMusic();document.querySelector('[data-action="toggle-music"]').textContent=state.musicOn?'🎵 ON':'🔇 Music';}
  else if(a==='toggle-pause'){togglePause();}
  else if(a==='toggle-tip'){state.showTip=!state.showTip;render();if(state.screen==='workout')startTimer();}
  else if(a==='show-save'){
    const p=document.getElementById('save-panel');
    if(p){
      const visible=p.style.display==='block';
      p.style.display=visible?'none':'block';
      if(!visible){const el=document.getElementById('save-code-text');if(el)el.textContent=encode();}
    }
  }
  else if(a==='copy-code'){
    const el=document.getElementById('save-code-text');
    if(el){navigator.clipboard.writeText(el.textContent).then(()=>{
      const btn=document.querySelector('[data-action="copy-code"]');
      if(btn){btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy Code';},2000);}
    }).catch(()=>{
      // fallback: select the text
      const range=document.createRange();range.selectNode(el);
      window.getSelection().removeAllRanges();window.getSelection().addRange(range);
    });}
  }
  else if(a==='restore-code'){
    const inp=document.getElementById('restore-input');
    if(inp&&inp.value.trim()){
      const ok=decode(inp.value.trim());
      if(ok){save();render();alert('Progress restored!');}
      else{alert('Invalid code — check you copied it correctly.');}
    }
  }
});


// ══════════════ APP ICON ══════════════
function setAppIcon(){
  try{
    const c=document.createElement('canvas');
    c.width=c.height=180;
    const ctx=c.getContext('2d');

    // Background
    ctx.fillStyle='#050510';
    ctx.fillRect(0,0,180,180);

    // Green radial glow
    const grd=ctx.createRadialGradient(90,100,0,90,100,95);
    grd.addColorStop(0,'rgba(0,255,136,0.13)');
    grd.addColorStop(1,'rgba(0,255,136,0)');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,180,180);

    ctx.lineCap='round';

    // ── Upper arm (shoulder top-right → elbow center) ──
    ctx.strokeStyle='#c8854a';
    ctx.lineWidth=30;
    ctx.beginPath();
    ctx.moveTo(128,44);
    ctx.lineTo(90,115);
    ctx.stroke();

    // ── Bicep bulge ──
    ctx.save();
    ctx.translate(112,74);
    ctx.rotate(-58*Math.PI/180);
    ctx.fillStyle='#d4924f';
    ctx.beginPath();
    ctx.ellipse(0,0,21,15,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // ── Forearm base (skin, slightly longer so cast sits on top) ──
    ctx.strokeStyle='#c8854a';
    ctx.lineWidth=24;
    ctx.beginPath();
    ctx.moveTo(90,115);
    ctx.lineTo(48,56);
    ctx.stroke();

    // ── Cast (white/light grey over forearm) ──
    ctx.strokeStyle='#dde0e8';
    ctx.lineWidth=24;
    ctx.beginPath();
    ctx.moveTo(90,115);
    ctx.lineTo(52,60);
    ctx.stroke();

    // ── Cast hash lines ──
    const castAngle=Math.atan2(60-115,52-90);
    const perpX=Math.cos(castAngle+Math.PI/2)*12;
    const perpY=Math.sin(castAngle+Math.PI/2)*12;
    ctx.strokeStyle='#b0b4c0';
    ctx.lineWidth=1.4;
    for(let i=1;i<=5;i++){
      const t=i/6;
      const mx=90+(52-90)*t, my=115+(60-115)*t;
      ctx.beginPath();
      ctx.moveTo(mx+perpX,my+perpY);
      ctx.lineTo(mx-perpX,my-perpY);
      ctx.stroke();
    }

    // ── Fist ──
    ctx.fillStyle='#c8854a';
    ctx.beginPath();
    ctx.arc(48,56,16,0,Math.PI*2);
    ctx.fill();
    // Knuckle shadows
    ctx.fillStyle='#a86535';
    [[-7,-7],[2,-10],[11,-8]].forEach(([dx,dy])=>{
      ctx.beginPath();
      ctx.arc(48+dx,56+dy,3.5,0,Math.PI*2);
      ctx.fill();
    });

    // ── Green accent dots ──
    ctx.fillStyle='#00ff88';
    ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.arc(90,158,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.arc(76,162,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(104,162,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    const url=c.toDataURL('image/png');

    // Apply as apple-touch-icon
    let li=document.querySelector("link[rel='apple-touch-icon']");
    if(!li){li=document.createElement('link');li.rel='apple-touch-icon';document.head.appendChild(li);}
    li.href=url;

    // Apply as favicon
    let fav=document.querySelector("link[rel='icon']");
    if(!fav){fav=document.createElement('link');fav.rel='icon';fav.type='image/png';document.head.appendChild(fav);}
    fav.href=url;
  }catch(e){console.warn('icon gen failed',e);}
}

// ══════════════ INIT ══════════════
load();
setAppIcon();
render();
</script>
